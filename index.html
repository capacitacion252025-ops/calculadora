<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Calculadora</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f6f9;
        font-family: Arial, sans-serif;
    }

    .calc {
        width: 240px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        padding: 15px;
    }

    .display {
        width: 100%;
        height: 45px;
        background: #222;
        color: #fff;
        text-align: right;
        font-size: 22px;
        border-radius: 8px;
        padding: 8px;
        box-sizing: border-box;
        margin-bottom: 10px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        background: #e4e6eb;
        transition: 0.2s;
    }

    button:hover {
        background: #d1d3d8;
    }

    .op { background: #4a90e2; color: white; }
    .eq { background: #34c759; color: white; }
    .clear { background: #ff3b30; color: white; }
</style>
</head>

<body>

<div class="calc">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="del()">⌫</button>
        <button class="op" onclick="add('/')">/</button>
        <button class="op" onclick="add('*')">*</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="op" onclick="add('-')">-</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="op" onclick="add('+')">+</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button class="eq" onclick="calculate()">=</button>

        <button onclick="add('0')">0</button>
        <button onclick="add('.')">.</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function add(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function del() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

function calculate() {
    try {
        let exp = display.innerText;

        if (/[\+\-\*\/\.]$/.test(exp)) {
            display.innerText = "Error";
            return;
        }

        display.innerText = Function("return " + exp)();
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>



<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora iPhone</title>

<style>
    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .calc {
        width: 260px;
        background: #000;
        border-radius: 30px;
        padding: 20px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }

    .display {
        color: #fff;
        font-size: 40px;
        text-align: right;
        margin-bottom: 20px;
        padding-right: 10px;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
    }

    button {
        height: 55px;
        border-radius: 50%;
        border: none;
        font-size: 20px;
        cursor: pointer;
        transition: 0.15s;
    }

    button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .num {
        background: #333;
        color: white;
    }

    .func {
        background: #a5a5a5;
        color: black;
    }

    .op {
        background: #ff9f0a;
        color: white;
    }

    .zero {
        grid-column: span 2;
        border-radius: 30px;
        text-align: left;
        padding-left: 20px;
    }
</style>
</head>

<body>

<div class="calc">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="func" onclick="clearDisplay()">AC</button>
        <button class="func" onclick="toggleSign()">±</button>
        <button class="func" onclick="percent()">%</button>
        <button class="op" onclick="add('/')">÷</button>

        <button class="num" onclick="add('7')">7</button>
        <button class="num" onclick="add('8')">8</button>
        <button class="num" onclick="add('9')">9</button>
        <button class="op" onclick="add('*')">×</button>

        <button class="num" onclick="add('4')">4</button>
        <button class="num" onclick="add('5')">5</button>
        <button class="num" onclick="add('6')">6</button>
        <button class="op" onclick="add('-')">−</button>

        <button class="num" onclick="add('1')">1</button>
        <button class="num" onclick="add('2')">2</button>
        <button class="num" onclick="add('3')">3</button>
        <button class="op" onclick="calculate()">=</button>

        <button class="num zero" onclick="add('0')">0</button>
        <button class="num" onclick="add('.')">.</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function add(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function toggleSign() {
    display.innerText = (parseFloat(display.innerText) * -1).toString();
}

function percent() {
    display.innerText = (parseFloat(display.innerText) / 100).toString();
}

function calculate() {
    try {
        let exp = display.innerText
            .replace(/÷/g, "/")
            .replace(/×/g, "*");

        if (/[\+\-\*\/\.]$/.test(exp)) {
            display.innerText = "Error";
            return;
        }

        display.innerText = Function("return " + exp)();
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
